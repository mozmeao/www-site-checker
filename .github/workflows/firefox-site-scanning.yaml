name: "www.firefox.com site scanning"

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3,15 * * *" # 03:17 UTC and 15:17 every day

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  SENTRY_DSN: https://45ad5d426da7480081831c053ca02cac@o1069899.ingest.sentry.io/6249535
  SLACK_NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_NOTIFICATION_WEBHOOK_URL }}
  FXC_CDN_HOSTNAME: ${{ secrets.FXC_CDN_HOSTNAME }}
  FXC_US_ORIGIN_HOSTNAME: ${{ secrets.FXC_US_ORIGIN_HOSTNAME }}
  FXC_EU_ORIGIN_HOSTNAME: ${{ secrets.FXC_EU_ORIGIN_HOSTNAME }}
  MEAO_IDENTITY_EMAIL: ${{ secrets.MEAO_IDENTITY_EMAIL }}
  ALLOWLIST_FILEPATH: data/allowlist-firefox.yaml
  EXTRA_URLS_FILEPATH: data/extra-urls-firefox.yaml
  USER_AGENT: Mozilla/5.0 (Automated; https://github.com/mozmeao/www-site-checker) CheckerBot/1.0

jobs:
  run_on_cdn:
    strategy:
      matrix:
        batch: ["1_8", "2_8", "3_8", "4_8", "5_8", "6_8", "7_8", "8_8"]
    runs-on: ubuntu-latest
    name: Check Firefox CDN - batch ${{ matrix.batch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install requirements
        run: pip install -r requirements.txt
      - name: Run checker
        env:
          BATCH: ${{ matrix.batch }}
        run: >
          python bin/scan_site.py
          --sitemap-url="https://$FXC_CDN_HOSTNAME/all-urls.xml"
          --batch="$BATCH"
          --export-cache
      - name: Upload scan output files
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: scan-results-${{ matrix.batch }}-firefox-CDN
          path: output
          retention-days: 15
      - name: Upload page-cache
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: html-cache-firefox-${{ matrix.batch }}
          path: page_cache
          retention-days: 5

  run_on_us_origin:
    strategy:
      matrix:
        batch: ["1_8", "2_8", "3_8", "4_8", "5_8", "6_8", "7_8", "8_8"]
    runs-on: ubuntu-latest
    name: Check Firefox US origin server - batch ${{ matrix.batch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install requirements
        run: pip install -r requirements.txt
      - name: Run checker
        env:
          BATCH: ${{ matrix.batch }}
        run: >
          python bin/scan_site.py
          --sitemap-url="https://$FXC_US_ORIGIN_HOSTNAME/all-urls.xml"
          --maintain-hostname
          --batch="$BATCH"
      - name: Upload scan output files
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: scan-results-${{ matrix.batch }}-firefox-US-origin
          path: output
          retention-days: 15

  run_on_eu_origin:
    strategy:
      matrix:
        batch: ["1_8", "2_8", "3_8", "4_8", "5_8", "6_8", "7_8", "8_8"]
    runs-on: ubuntu-latest
    name: Check Firefox EU origin server - batch ${{ matrix.batch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install requirements
        run: pip install -r requirements.txt
      - name: Run checker
        env:
          BATCH: ${{ matrix.batch }}
        run: >
          python bin/scan_site.py
          --sitemap-url="https://$FXC_EU_ORIGIN_HOSTNAME/all-urls.xml"
          --maintain-hostname
          --batch="$BATCH"
      - name: Upload scan output files
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: scan-results-${{ matrix.batch }}-firefox-EU-origin
          path: output
          retention-days: 15

  alert_if_report_files_exist:
    name: Alert if report files exist
    runs-on: ubuntu-latest
    needs:
      - run_on_cdn
      - run_on_us_origin
      - run_on_eu_origin
    permissions:
      contents: write  # needed to push allowlist update branches
      pull-requests: write  # needed to open allowlist update PRs
      issues: write  # needed to file scan result issues
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install requirements
        run: pip install -r requirements.txt
      - name: Download all artifacts, if they exist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: output
          merge-multiple: true
      - name: Handle the scan results
        run: python bin/handle_site_scan_output.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
